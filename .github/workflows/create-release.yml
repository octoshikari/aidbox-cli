name: Build binaries for macOS, Linux, Windows, publish Node.js packages, create release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Setup
        uses: actions/setup-node@v2
        with:
          node-version: '14.x'
      - name: Package
        run: |
          npm ci
          npm run build
          npm run package:macos

      - name: Create tarball
        run: |
          mv binary/macos/aidbox-types-generator-x64 aidbox-types-generator
          tar -cvzf aidbox-types-generator-macos-x64.tar.gz aidbox-types-generator
          mv binary/macos/aidbox-types-generator-arm64 aidbox-types-generator
          tar -cvzf aidbox-types-generator-macos-arm64.tar.gz aidbox-types-generator

      - name: Upload tarball artifact x64
        uses: actions/upload-artifact@v2
        with:
          name: bin-macos-x64
          path: aidbox-types-generator-macos-x64.tar.gz
      - name: Upload tarball artifact arm64
        uses: actions/upload-artifact@v2
        with:
          name: bin-macos-arm64
          path: aidbox-types-generator-macos-arm64.tar.gz

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup
        uses: actions/setup-node@v2
        with:
          node-version: '14.x'

      - name: Package
        run: |
          npm ci
          npm run build
          npm run package:linux

      - name: Create tarball
        run: |
          mv binary/linux/aidbox-types-generator aidbox-types-generator
          tar -cvzf aidbox-types-generator-linux-x64.tar.gz aidbox-types-generator


      - name: Upload tarball artifact
        uses: actions/upload-artifact@v2
        with:
          name: bin-linux
          path: aidbox-types-generator-linux-x64.tar.gz

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup
        uses: actions/setup-node@v2
        with:
          node-version: '14.x'

      - name: Package
        run: |
          npm ci
          npm run build
          npm run package:win

      - name: Create tarball
        run: |
          mv binary/win/aidbox-types-generator aidbox-types-generator
          tar -cvzf aidbox-types-generator-windows-x64.tar.gz aidbox-types-generator

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v2
        with:
          name: bin-windows
          path: aidbox-types-generator-windows-x64.tar.gz


  publish-node-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup
        uses: actions/setup-node@v2
        with:
          node-version: '14.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Build and publish to npm registry
        continue-on-error: true
        run: |
          npm ci
          npm run build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: actions/setup-node@v2
        with:
          node-version: '14.x'
          registry-url: 'https://npm.pkg.github.com'

      - name: Publish to GitHub registry
        continue-on-error: true
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    needs: [ build-macos, build-linux, build-windows, publish-node-packages ]

    runs-on: ubuntu-latest

    steps:
      - name: Download macos tarball
        uses: actions/download-artifact@v2
        with:
          name: bin-macos-x64
      - name: Download macos tarball
        uses: actions/download-artifact@v2
        with:
          name: bin-macos-arm64
      - name: Download linux tarball
        uses: actions/download-artifact@v2
        with:
          name: bin-linux
      - name: Download linux tarball
        uses: actions/download-artifact@v2
        with:
          name: bin-windows

      - name: Compute checksums
        run: |
          sha256sum aidbox-types-generator-windows-x64.tar.gz >> checksums.md
          sha256sum aidbox-types-generator-linux-x64.tar.gz >> checksums.md
          sha256sum aidbox-types-generator-macos-x64.tar.gz >> checksums.md
          sha256sum aidbox-types-generator-macos-arm64.tar.gz >> checksums.md

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          prerelease: true
          body_path: checksums.md
          files: |
            LICENSE
            aidbox-types-generator-windows-x64.tar.gz
            aidbox-types-generator-linux-x64.tar.gz
            aidbox-types-generator-macos-x64.tar.gz
            aidbox-types-generator-macos-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  notify:
    needs: [ create-release ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v1
        with:
          node-version: 14
      - name: get-npm-version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@master
      - name: Send Telegram notifications
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          disable_web_page_preview: true
          message: |
            Published version ${{ steps.package-version.outputs.current-version }}
            NPM: https://www.npmjs.com/package/@octoshikari-oss/aidbox-types-generator/v/${{ steps.package-version.outputs.current-version }}
